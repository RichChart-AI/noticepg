<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>부자차트 공지</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 40px;
        }

        .main-title {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .sub-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 40px;
        }

        /* ===== 바둑판 Grid ===== */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3열 */
            gap: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .class-box {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            min-height: 150px;
        }

        .class-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .class-detail {
            font-size: 18px;
            line-height: 1.6;
        }

        /* 로고 */
        .logo-area {
            margin-top: 80px;
        }

        .logo-area img {
            width: 120px;
            height: auto;
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: 1fr; /* 모바일 1열 */
            }
        }
    </style>
</head>

<body>

    <div class="main-title">부자차트 공지</div>
    <div class="sub-title">수업일정</div>

    <div class="grid-container">

        <!-- 1 -->
        <div class="class-box">
            <div class="class-title">1. 라이브 분석</div>
            <div class="class-detail">
                주제 : 제로데이옵션<br>
                매주 화요일<br>
                밤 10시 30분
            </div>
        </div>

        <!-- 2 -->
        <div class="class-box">
            <div class="class-title">2. 차트수업</div>
            <div class="class-detail">
                매주 수요일<br>
                저녁 7시 30분
            </div>
        </div>

        <!-- 3 -->
        <div class="class-box">
            <div class="class-title">3. 옵션 심화 수업</div>
            <div class="class-detail">
                매주 목요일<br>
                저녁 7시 30분<br>
                4월 9일, 16일만 금요일 변동
            </div>
        </div>

        <!-- 4 -->
        <div class="class-box">
            <div class="class-title">4. 옵션 기본수업</div>
            <div class="class-detail">
                매주 토요일<br>
                저녁 7시 30분
            </div>
        </div>

        <!-- 5 -->
        <div class="class-box">
            <div class="class-title">5. 해외선물옵션 심화수업</div>
            <div class="class-detail">
                매주 일요일<br>
                저녁 7시 30분
            </div>
        </div>

        <!-- 빈칸 (6번째 칸) -->
        <div></div>

    </div>

    <!-- 로고 -->
    <div class="logo-area">
        <img src="RC.png" alt="RC Logo">
    </div>

</body>
</html>
